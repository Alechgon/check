<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#333333">
<title>SOSER · Técnico</title>
<style>
:root{
  --carbon:#333333;--carbon-2:#262626;--ink:#2A2A2A;
  --orange:#F49A0F;--orange-d:#DE7C08;--green:#7DB61C;--green-d:#5E8E13;--leaf:#2E7D32;
  --paper:#F5F6F4;--card:#FFFFFF;--line:#E6E6E1;--muted:#8C8C86;--red:#CE4257;--red-d:#B3283A;--blue:#1769AA;--yellow:#F2C230;
  --shadow:0 12px 34px rgba(51,51,51,.12);--shadow-sm:0 4px 16px rgba(51,51,51,.08);
  --grad:linear-gradient(120deg,var(--orange),var(--green));
  --grad-green:linear-gradient(120deg,var(--green),var(--green-d));
  --grad-soft:linear-gradient(135deg,rgba(244,154,15,.13),rgba(125,182,28,.13));
  --r:20px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--paper);color:var(--ink);line-height:1.45;font-size:15px;-webkit-font-smoothing:antialiased;}
.hidden{display:none!important;}
.app{max-width:900px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
button{font-family:inherit;}
:focus-visible{outline:3px solid rgba(125,182,28,.5);outline-offset:2px;}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;}}

.topbar{flex:0 0 auto;background:var(--carbon);color:#fff;display:flex;align-items:center;gap:13px;padding:13px 18px;padding-top:calc(13px + env(safe-area-inset-top));box-shadow:0 2px 18px rgba(0,0,0,.22);z-index:40;}
.logo{width:40px;height:40px;flex:0 0 auto;border-radius:12px;background:#fff;padding:5px;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,.18);}
.logo svg{width:100%;height:100%;}
.brand{display:flex;flex-direction:column;line-height:1.05;}
.brand b{font-size:18px;letter-spacing:2.5px;font-weight:800;}
.brand span{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:2.5px;background:var(--grad-green);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.topbar .right{margin-left:auto;display:flex;gap:9px;align-items:center;}
.techtag{font-size:12px;color:#d3d3ce;background:rgba(255,255,255,.09);padding:6px 12px;border-radius:22px;font-weight:700;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.iconbtn{background:rgba(255,255,255,.10);border:none;color:#fff;width:40px;height:40px;border-radius:11px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.iconbtn:active{background:rgba(255,255,255,.22);}

.content{flex:1 1 auto;display:flex;flex-direction:column;min-height:0;padding:16px 16px 0;overflow:hidden;}
.screen{flex:1 1 auto;display:flex;flex-direction:column;min-height:0;animation:fade .3s cubic-bezier(.2,.7,.3,1);}
@keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
@keyframes bpop{from{transform:scale(.6) translateY(20px);opacity:0;}to{transform:none;opacity:1;}}
.navwrap{flex:0 0 auto;padding:14px 16px calc(14px + env(safe-area-inset-bottom));}
.navwrap .inner{display:flex;gap:11px;}
.btn{flex:1;border:none;border-radius:15px;padding:16px;font-size:15px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn.primary{background:var(--carbon);color:#fff;box-shadow:0 6px 18px rgba(51,51,51,.26);}
.btn.primary:disabled{background:#C4C4BE;box-shadow:none;cursor:not-allowed;}
.btn.accent{background:var(--grad);color:#fff;box-shadow:0 6px 20px rgba(244,154,15,.30);}
.btn.green{background:var(--grad-green);color:#fff;box-shadow:0 6px 20px rgba(125,182,28,.30);}
.btn.green:disabled{background:#C4C4BE;box-shadow:none;cursor:not-allowed;}
.btn.blue{background:var(--blue);color:#fff;}
.btn.danger{background:var(--red);color:#fff;}
.btn.ghost{flex:0 0 auto;background:#fff;border:1.5px solid var(--line);color:var(--muted);min-width:56px;}
.btn:active{transform:scale(.98);}

.hero{text-align:center;padding:18px 12px 4px;flex:0 0 auto;}
.hero .mark{width:78px;height:78px;border-radius:24px;margin:0 auto 12px;background:#fff;display:flex;align-items:center;justify-content:center;padding:13px;box-shadow:0 16px 40px rgba(125,182,28,.20),0 6px 16px rgba(94,142,19,.16);}
.hero h1{margin:6px 0 3px;font-size:23px;color:var(--carbon);font-weight:800;}
.hero p{margin:0;color:var(--muted);font-size:13.5px;}

.kpi-list{display:flex;flex-direction:column;gap:13px;margin-top:20px;flex:0 0 auto;}
.kpi-btn{display:flex;align-items:center;gap:16px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;cursor:pointer;box-shadow:var(--shadow-sm);transition:transform .12s;text-align:left;width:100%;position:relative;overflow:hidden;}
.kpi-btn:active{transform:scale(.985);}
.kpi-btn .kic{width:50px;height:50px;border-radius:15px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:24px;background:var(--grad-soft);}
.kpi-btn .kmain{flex:1;min-width:0;}
.kpi-btn .kname{font-size:17px;font-weight:800;color:var(--carbon);}
.kpi-btn .ksub{font-size:12px;color:var(--muted);font-weight:600;margin-top:1px;}
.kpi-btn .knum{flex:0 0 auto;min-width:58px;height:52px;border-radius:15px;background:var(--green-d);color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;padding:0 12px;box-shadow:inset 0 -3px 0 rgba(0,0,0,.18);}
.kpi-btn.pend .kic{background:var(--grad);color:#fff;}
.kpi-btn.hist .kic{background:rgba(94,142,19,.14);}
.kpi-btn.hist .knum{background:var(--carbon);}
.kpi-btn.buscar .kic{background:rgba(23,105,170,.12);}
.kpi-btn.buscar .knum{background:var(--blue);min-width:52px;}
.knum.bump{animation:bump .5s cubic-bezier(.3,1.4,.5,1);}
@keyframes bump{40%{transform:scale(1.22);}}

.cfg-fab{margin:16px auto 0;width:54px;height:54px;border-radius:17px;background:var(--card);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;box-shadow:var(--shadow-sm);flex:0 0 auto;}
.cfg-fab:active{background:var(--paper);transform:scale(.96);}
.cfg-warn{background:var(--grad-soft);border:1px solid rgba(125,182,28,.4);color:#5a7207;border-radius:14px;padding:12px 14px;font-size:13px;margin-top:14px;text-align:center;line-height:1.4;flex:0 0 auto;}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:22px;box-shadow:var(--shadow-sm);}
.eyebrow{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1.4px;margin-bottom:7px;}
.eyebrow b{background:var(--grad-green);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
h2.q{font-size:20px;margin:2px 0 16px;line-height:1.3;color:var(--carbon);font-weight:800;}
label.fld{display:block;font-size:12px;font-weight:800;color:var(--muted);margin:0 0 8px;text-transform:uppercase;letter-spacing:.5px;}
input[type=text],input[type=url],input[type=number],textarea,select{width:100%;border:1.5px solid var(--line);border-radius:13px;padding:14px 15px;font-size:16px;font-family:inherit;background:#fff;color:var(--ink);outline:none;transition:border-color .15s,box-shadow .15s;}
input:focus,textarea:focus,select:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(125,182,28,.15);}
.field-block{margin-bottom:16px;}
.banner{background:var(--grad-soft);border:1px solid rgba(125,182,28,.3);color:#5a7207;border-radius:14px;padding:12px 14px;font-size:13px;margin-bottom:16px;line-height:1.45;}
.note{font-size:12px;color:var(--muted);margin-top:10px;line-height:1.5;}

/* SEARCH con cotejo */
.search-wrap{position:relative;margin-bottom:12px;flex:0 0 auto;}
.search-wrap input{padding:15px 44px 15px 46px;border-radius:14px;font-weight:500;}
.search-wrap .ic-lead{position:absolute;left:15px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--muted);pointer-events:none;}
.search-wrap .clearbtn{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:var(--paper);border:none;border-radius:10px;width:32px;height:32px;font-size:15px;cursor:pointer;color:var(--muted);}
.suggest{position:absolute;left:0;right:0;top:calc(100% + 8px);z-index:1200;background:#fff;border:1px solid var(--line);border-radius:15px;overflow:hidden;box-shadow:0 18px 42px rgba(51,51,51,.18);max-height:52vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.suggest .sopt{padding:13px 15px;cursor:pointer;border-bottom:1px solid var(--paper);font-size:15px;font-weight:600;color:var(--carbon);display:flex;gap:11px;align-items:center;}
.suggest .sopt:active,.suggest .sopt.hl{background:var(--paper);}
.suggest .sopt .stxt{flex:1;min-width:0;}
.suggest .sopt small{display:block;color:var(--muted);font-size:12px;font-weight:500;margin-top:2px;}

.mkpis{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:12px;flex:0 0 auto;}
.mkpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px 8px;text-align:center;box-shadow:var(--shadow-sm);position:relative;overflow:hidden;}
.mkpi .n{font-size:22px;font-weight:800;color:var(--carbon);line-height:1;}
.mkpi .l{font-size:10px;color:var(--muted);font-weight:800;margin-top:3px;text-transform:uppercase;letter-spacing:.4px;}
.mkpi .bar{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--grad-green);}
.mkpi.o .n{color:var(--orange-d);}.mkpi.o .bar{background:var(--orange);}
.mkpi.g .n{color:var(--green-d);}.mkpi.g .bar{background:var(--green);}

.caselist{flex:1 1 auto;overflow-y:auto;min-height:0;padding-bottom:8px;-webkit-overflow-scrolling:touch;}
.case{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow-sm);display:flex;gap:12px;align-items:stretch;cursor:pointer;transition:transform .1s;}
.case:active{transform:scale(.99);}
.case.em{border-color:rgba(206,66,87,.4);background:linear-gradient(120deg,#fff,#fff6f6);}
.case .cid{background:var(--grad-green);color:#fff;font-weight:800;font-size:13px;padding:8px 10px;border-radius:12px;display:flex;align-items:center;justify-content:center;min-width:62px;text-align:center;flex:0 0 auto;}
.case.em .cid{background:linear-gradient(120deg,var(--red),var(--red-d));}
.case .cbody{flex:1;min-width:0;}
.case .ctitle{font-weight:700;color:var(--carbon);font-size:14.5px;margin-bottom:3px;}
.case .cdesc{color:#666;font-size:13px;margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.case .cmeta{font-size:11.5px;color:var(--muted);display:flex;gap:9px;flex-wrap:wrap;align-items:center;}
.cstate{font-size:11px;font-weight:800;padding:2px 9px;border-radius:12px;}
.cstate.fin{background:rgba(125,182,28,.15);color:var(--green-d);}
.cstate.pend{background:rgba(244,154,15,.15);color:var(--orange-d);}
.cstate.em{background:rgba(206,66,87,.15);color:var(--red);}
.case .cside{display:flex;flex-direction:column;gap:6px;justify-content:center;flex:0 0 auto;}
.cverif{background:var(--grad-soft);border:1px solid var(--line);color:var(--green-d);border-radius:11px;padding:8px 6px;font-size:10px;font-weight:800;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:50px;}
.cverif .vic{font-size:16px;}

/* burbuja de caso */
.bubble-head{flex:0 0 auto;background:var(--grad-green);color:#fff;border-radius:20px;padding:16px 18px;box-shadow:0 10px 26px rgba(125,182,28,.28);animation:bpop .35s cubic-bezier(.2,1.15,.35,1);margin-bottom:12px;}
.bubble-head.em{background:linear-gradient(120deg,var(--red),var(--red-d));box-shadow:0 10px 26px rgba(206,66,87,.34);}
.bubble-head .bh-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.bubble-head .bh-id{background:rgba(255,255,255,.22);border-radius:10px;padding:5px 10px;font-weight:800;font-size:13px;}
.bubble-head .bh-state{margin-left:auto;background:rgba(255,255,255,.9);color:var(--carbon);border-radius:10px;padding:4px 10px;font-weight:800;font-size:11px;}
.bubble-head h3{margin:0 0 3px;font-size:17px;font-weight:800;}
.bubble-head .bh-meta{font-size:12px;color:rgba(255,255,255,.9);display:flex;gap:10px;flex-wrap:wrap;}
.bubble-head .bh-desc{margin-top:9px;font-size:13.5px;background:rgba(255,255,255,.15);border-radius:12px;padding:10px 12px;line-height:1.5;}

.verif-lbl{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:8px 0 6px;flex:0 0 auto;}
.verif-strip{flex:0 0 auto;display:flex;gap:8px;overflow-x:auto;padding:4px 0 10px;-webkit-overflow-scrolling:touch;}
.verif-strip .vs{width:66px;height:66px;border-radius:12px;overflow:hidden;border:1px solid var(--line);flex:0 0 auto;position:relative;cursor:pointer;background:#000;}
.verif-strip .vs img,.verif-strip .vs video{width:100%;height:100%;object-fit:cover;}
.verif-strip .vs .vt{position:absolute;bottom:0;left:0;right:0;background:rgba(42,42,42,.8);color:#fff;font-size:9px;text-align:center;}

/* Estado / cierre */
.state-box{flex:0 0 auto;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:var(--shadow-sm);margin-bottom:12px;}
.state-toggle{display:flex;gap:10px;}
.state-btn{flex:1;border-radius:14px;padding:16px;font-size:15px;font-weight:800;cursor:pointer;border:2px solid var(--line);background:#fff;color:var(--muted);display:flex;align-items:center;justify-content:center;gap:8px;transition:.15s;}
.state-btn.sel-pend{border-color:var(--orange);background:var(--grad-soft);color:var(--orange-d);}
.state-btn.sel-sol{border-color:var(--green);background:linear-gradient(120deg,rgba(125,182,28,.15),rgba(94,142,19,.1));color:var(--green-d);}
.state-btn .big{font-size:20px;}

/* GPS pill */
.gps-pill{display:flex;align-items:center;gap:9px;background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:11px 14px;font-size:13px;font-weight:700;margin-top:12px;}
.gps-pill.ok{background:rgba(125,182,28,.1);border-color:rgba(125,182,28,.4);color:var(--green-d);}
.gps-pill.err{background:rgba(206,66,87,.08);border-color:rgba(206,66,87,.35);color:var(--red-d);}
.gps-pill .gdot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;}
.gps-pill.ok .gdot{background:var(--green);box-shadow:0 0 0 3px rgba(125,182,28,.25);}
.gps-pill.err .gdot{background:var(--red);}
.gps-pill.wait .gdot{background:var(--orange);animation:blink 1s infinite;}
@keyframes blink{50%{opacity:.3;}}
.gps-mini{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:var(--muted);margin:12px 0 4px;padding:7px 11px;background:var(--paper);border:1px solid var(--line);border-radius:10px;}
.gps-mini .gd{width:8px;height:8px;border-radius:50%;flex:0 0 auto;background:var(--muted);}
.gps-mini.ok{color:var(--green-d);background:rgba(125,182,28,.08);border-color:rgba(125,182,28,.3);}
.gps-mini.ok .gd{background:var(--green);box-shadow:0 0 0 3px rgba(125,182,28,.2);}
.gps-mini.wait{color:var(--orange-d);}
.gps-mini.wait .gd{background:var(--orange);animation:blink 1s infinite;}
.gps-mini.off .gd{background:var(--muted);}

/* Modal de cierre */
.modal-bg{position:fixed;inset:0;background:rgba(30,30,30,.5);z-index:2500;display:flex;align-items:flex-end;justify-content:center;animation:fade .2s;}
.modal{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:600px;max-height:92dvh;display:flex;flex-direction:column;animation:slideup .3s cubic-bezier(.2,.8,.3,1);}
@keyframes slideup{from{transform:translateY(100%);}to{transform:none;}}
.modal-head{flex:0 0 auto;padding:20px 20px 12px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;}
.modal-head h3{margin:0;font-size:18px;font-weight:800;color:var(--carbon);flex:1;}
.modal-head .mclose{background:var(--paper);border:none;width:38px;height:38px;border-radius:11px;font-size:18px;cursor:pointer;color:var(--muted);}
.modal-body{flex:1 1 auto;overflow-y:auto;padding:18px 20px;min-height:0;-webkit-overflow-scrolling:touch;}
.modal-foot{flex:0 0 auto;padding:14px 20px calc(16px + env(safe-area-inset-bottom));border-top:1px solid var(--line);display:flex;gap:10px;}

.yesno{display:flex;gap:12px;margin-bottom:8px;}
.yesno button{flex:1;border-radius:14px;padding:18px;font-size:16px;font-weight:800;cursor:pointer;border:2px solid var(--line);background:#fff;color:var(--muted);}
.yesno button.sel{border-color:var(--green);background:linear-gradient(120deg,rgba(125,182,28,.15),rgba(94,142,19,.08));color:var(--green-d);}

/* Materiales */
.mat-item{display:flex;gap:8px;align-items:center;background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:10px 12px;margin-bottom:8px;}
.mat-item .mi-main{flex:1;min-width:0;}
.mat-item .mi-name{font-weight:700;color:var(--carbon);font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mat-item .mi-sub{font-size:11.5px;color:var(--muted);margin-top:1px;}
.mat-item .mi-qty{width:56px;flex:0 0 auto;}
.mat-item .mi-qty input{padding:9px;text-align:center;border-radius:10px;font-size:15px;font-weight:700;}
.mat-item .mi-rm{background:none;border:none;color:var(--red);font-size:17px;cursor:pointer;flex:0 0 auto;}
.mat-total{display:flex;justify-content:space-between;align-items:center;padding:14px;background:var(--grad-soft);border-radius:13px;font-weight:800;color:var(--carbon);margin-top:6px;}
.mat-total .mt-val{font-size:19px;color:var(--green-d);}
.add-mat-btn{width:100%;border:1.5px dashed var(--green);background:rgba(125,182,28,.06);color:var(--green-d);border-radius:13px;padding:14px;font-weight:800;font-size:14px;cursor:pointer;margin-top:4px;}

/* uploader */
.up-zone{border:1.5px dashed var(--line);border-radius:16px;padding:20px;text-align:center;cursor:pointer;background:#fff;transition:.15s;}
.up-zone:active{background:var(--paper);}
.up-zone .up-ic{font-size:32px;margin-bottom:6px;}
.up-zone .up-t{font-weight:800;color:var(--carbon);font-size:14px;}
.up-zone .up-s{font-size:12px;color:var(--muted);margin-top:3px;}
.up-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:9px;margin-top:12px;}
.up-thumb{position:relative;aspect-ratio:1;border-radius:12px;overflow:hidden;border:1px solid var(--line);background:#000;}
.up-thumb img,.up-thumb video{width:100%;height:100%;object-fit:cover;}
.up-thumb .rm{position:absolute;top:4px;right:4px;background:rgba(206,66,87,.92);color:#fff;border:none;width:24px;height:24px;border-radius:8px;font-size:13px;cursor:pointer;}
.up-thumb .prog{position:absolute;inset:0;background:rgba(42,42,42,.7);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:12px;}
.up-thumb .badge{position:absolute;bottom:4px;left:4px;background:rgba(94,142,19,.9);color:#fff;font-size:9px;font-weight:800;padding:2px 6px;border-radius:6px;}
.progress-bar{height:6px;background:var(--line);border-radius:6px;overflow:hidden;margin-top:10px;}
.progress-bar .fill{height:100%;background:var(--grad-green);width:0;transition:width .3s;}

.viewer-bg{position:fixed;inset:0;background:rgba(20,20,20,.94);z-index:3000;display:flex;flex-direction:column;animation:fade .2s;}
.viewer-top{display:flex;align-items:center;gap:12px;padding:16px;padding-top:calc(16px + env(safe-area-inset-top));color:#fff;}
.viewer-top .vcount{font-weight:800;font-size:15px;}
.viewer-top .vopen{margin-left:auto;background:rgba(255,255,255,.12);border:none;color:#fff;height:40px;padding:0 14px;border-radius:11px;font-size:12.5px;font-weight:800;cursor:pointer;text-decoration:none;display:flex;align-items:center;}
.viewer-top .vclose{background:rgba(255,255,255,.15);border:none;color:#fff;width:40px;height:40px;border-radius:11px;font-size:20px;cursor:pointer;flex:0 0 auto;}
.viewer-stage{flex:1;display:flex;align-items:center;justify-content:center;position:relative;min-height:0;padding:0 8px;}
.viewer-stage img,.viewer-stage video{max-width:100%;max-height:100%;object-fit:contain;border-radius:10px;}
.viewer-stage iframe{width:min(100%,760px);height:min(100%,72vh);border:none;border-radius:10px;background:#000;}
.viewer-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.16);border:none;color:#fff;width:48px;height:48px;border-radius:50%;font-size:24px;cursor:pointer;z-index:3;}
.viewer-nav.prev{left:10px;}.viewer-nav.next{right:10px;}
.viewer-nav:disabled{opacity:.25;}
.viewer-cap{padding:14px 16px calc(18px + env(safe-area-inset-bottom));color:#ddd;font-size:13px;text-align:center;word-break:break-all;}

.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:var(--carbon);color:#fff;padding:14px 22px;border-radius:30px;font-size:14px;font-weight:700;z-index:4000;box-shadow:var(--shadow);max-width:90%;text-align:center;}
.empty{text-align:center;padding:34px 18px;color:var(--muted);}
.empty .ic{font-size:38px;margin-bottom:10px;}
.spinner{width:18px;height:18px;border:3px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;display:inline-block;animation:spin .7s linear infinite;}
.loading{padding:30px;text-align:center;color:var(--muted);font-weight:700;}
.loading .spinner{border-color:rgba(140,140,134,.3);border-top-color:var(--green);}
@keyframes spin{to{transform:rotate(360deg);}}
.pin-dots{display:flex;gap:11px;justify-content:center;margin:16px 0 20px;}
.pin-dots i{width:14px;height:14px;border-radius:50%;background:var(--line);transition:.15s;}
.pin-dots i.on{background:var(--grad-green);transform:scale(1.15);}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;max-width:290px;margin:0 auto;}
.pin-key{border:1.5px solid var(--line);background:#fff;border-radius:16px;padding:16px 0;font-size:23px;font-weight:800;color:var(--carbon);cursor:pointer;}
.pin-key:active{background:var(--paper);}
@media (min-width:700px){.content{padding:22px 26px 0;}.kpi-list{max-width:640px;margin:20px auto 0;width:100%;}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo" id="logoSlot"></div>
    <div class="brand"><b>SOSER</b><span>Técnico</span></div>
    <div class="right">
      <div class="techtag hidden" id="techTag"></div>
      <button class="iconbtn hidden" id="btnHome" title="Inicio">⌂</button>
    </div>
  </div>
  <div class="content" id="content"></div>
  <div class="navwrap hidden" id="navwrap"><div class="inner">
    <button class="btn ghost" id="btnBack">‹</button>
    <button class="btn green" id="btnNext">Continuar</button>
  </div></div>
</div>
<div id="overlays"></div>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
